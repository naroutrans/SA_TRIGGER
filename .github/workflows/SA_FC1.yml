name: SA_FC1

on:
  schedule:
    - cron: '0 17 * * *'  # 02:00 JST
    - cron: '0 5 * * *'   # 14:00 JST
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛎 Check out master
        uses: actions/checkout@master
        with:
          repository: ${{ secrets.REPO_ORG }}/${{ secrets.REPO_NAME }}
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
      - name: 🔨 Set up Java
        uses: actions/setup-java@v1
        with:
          java-version: '11'
          architecture: x64
      - name: Install 7zip
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full
      - name: Extract inside BIN/FC1_MAIN
        run: |
          mkdir -p BIN/FC1_MAIN
          cp BIN/FC/FC1_MAIN.zip BIN/FC1_MAIN/
      - name: Run ENC
        working-directory: BIN/FC1_MAIN
        run: |
          7z x -y -p"${{ secrets.FC1_PASS }}" FC1_MAIN.zip
          ls -al
      - name: Run JAR 1
        run: |
          cd BIN/FC1_MAIN
          java -jar FCA1_001_Main.jar NewListCheck
      - name: Run JAR 2
        run: |
          cd BIN/FC1_MAIN
          java -jar FCA1_001_Main.jar NewListCheck
      - name: Run JAR 3
        run: |
          cd BIN/FC1_MAIN
          java -jar FCA1_001_Main.jar SellerCheck
